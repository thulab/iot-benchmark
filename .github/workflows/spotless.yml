name: spotless-check
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  spotless-check:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          path: iot-benchmark
      - name: Set java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17
      - name: spotless-check
        run: |
          cd ${{ github.workspace }}/iot-benchmark
          mvn spotless:check
